attr global logfile ./log/fhem-%Y-%m.log
attr global modpath .
attr global verbose 3
attr global statefile ./log/fhem.save
attr global motd none

define WEB FHEMWEB 8083 global

# Optional log access from the web frontend.
define Logfile FileLog ./log/fhem-%Y-%m.log Logfile

define autocreate autocreate
attr autocreate filelog ./log/%NAME-%Y.log

define eventTypes eventTypes ./log/eventTypes.txt

# Disable this if you do not want automatic USB detection at startup.
define initialUsbCheck notify global:INITIALIZED usb create

# Classic browser Basic Auth via allowed.
# Credentials for live testing:
#   user: fhemuser
#   password: secret
define allowedWEB allowed
attr allowedWEB validFor WEB
attr allowedWEB basicAuth ZmhlbXVzZXI6c2VjcmV0

# Header-based authentication via WebAuth.
# This path is intended for a trusted reverse proxy or auth layer that injects
# identity headers after successful upstream authentication.
define webAuthWEB WebAuth
attr webAuthWEB validFor WEB
attr webAuthWEB strict 0
attr webAuthWEB headerAuthPolicy {"op":"AND","items":[{"header":"X-Forwarded-User","match":"present"},{"header":"X-Auth-Source","match":"equals","value":"oauth2-proxy"}]}

# Optional example for static assets or health probes.
# attr webAuthWEB noCheckFor ^/fhem/icons/
